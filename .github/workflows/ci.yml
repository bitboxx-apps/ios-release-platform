name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load app configuration
        run: |
          if [ -f .env.app ]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// /}" ]] && continue
              if [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
                echo "$line" >> "$GITHUB_ENV"
                eval "export $line"
              fi
            done < .env.app
          fi
          if [ -z "${APP_NAME:-}" ]; then
            echo "APP_NAME is empty. Ensure .env.app contains APP_NAME=..."
            exit 1
          fi
          # Derive values
          echo "APP_SCHEME=${APP_NAME}" >> "$GITHUB_ENV"
          echo "XCODE_PROJECT_PATH=app/${APP_NAME}.xcodeproj" >> "$GITHUB_ENV"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: SPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/*.xcodeproj/project.pbxproj', '**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project "$XCODE_PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "$XCODE_PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            || echo "No tests found — skipping"
